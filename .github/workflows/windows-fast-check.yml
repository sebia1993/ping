name: Windows Fast Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "stability/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-fast-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-verify:
    name: Source verifier
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run source release verifier
        shell: pwsh
        run: python scripts\verify_release.py
