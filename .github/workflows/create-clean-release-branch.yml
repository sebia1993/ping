name: Create Clean Release Branch

on:
  workflow_dispatch:
  push:
    branches:
      - stability/windows-release-verify-20260628
    paths:
      - ".github/workflows/create-clean-release-branch.yml"
      - ".github/validation/**"

permissions:
  contents: write

concurrency:
  group: create-clean-release-branch
  cancel-in-progress: true

jobs:
  create-clean-branch:
    name: Create clean branch from main plus validated patches
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Configure Git line endings
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Check out validation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patches and push clean branch
        shell: pwsh
        env:
          CLEAN_BRANCH: stability/windows-release-automation-clean-20260629
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $patchDir = Join-Path $env:RUNNER_TEMP "validation-patches"
          New-Item -ItemType Directory -Force -Path $patchDir | Out-Null
          Copy-Item -Recurse -Force .github\validation\* $patchDir

          git fetch origin main
          git switch --detach origin/main

          $parts = Get-ChildItem -Path $patchDir -Filter 'local-release-changes.patch.b64.part*' | Sort-Object Name
          if ($parts.Count -ne 6) {
            throw "Expected 6 patch chunks, found $($parts.Count)."
          }
          $base64 = ($parts | ForEach-Object { (Get-Content -LiteralPath $_.FullName -Raw).Trim() }) -join ''
          $rawSha = [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::ASCII.GetBytes($base64))).Replace('-', '').ToLowerInvariant()
          if ($rawSha -eq 'f0e084c94dd78a4f850143d5b3e0850a349aaf2729dd61cc6d52021a2a7c8ca6') {
            $base64 = $base64.Insert(28821, 'j')
          }
          $sha = [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::ASCII.GetBytes($base64))).Replace('-', '').ToLowerInvariant()
          if ($sha -ne 'a215255bbc5510e2375f897bde329cc18f2ced4b0eef056f57dc') {
            throw "Patch payload SHA mismatch: $sha"
          }
          [System.IO.File]::WriteAllBytes('local-release-changes.patch.gz', [System.Convert]::FromBase64String($base64))
          @'
          from pathlib import Path
          import gzip
          Path("local-release-changes.patch").write_bytes(gzip.decompress(Path("local-release-changes.patch.gz").read_bytes()))
          '@ | python -

          $patches = @(
            "local-release-changes.patch",
            (Join-Path $patchDir "windows-mtime-fix.patch"),
            (Join-Path $patchDir "release-automation-nonworkflow.patch"),
            (Join-Path $patchDir "release-automation-followup.patch"),
            (Join-Path $patchDir "release-automation-contract-tests.patch"),
            (Join-Path $patchDir "release-automation-workflow-files.patch")
          )
          foreach ($patch in $patches) {
            git apply --check $patch
            git apply $patch
          }

          Remove-Item -Force local-release-changes.patch, local-release-changes.patch.gz -ErrorAction SilentlyContinue
          git diff --check
          git add -A
          git diff --cached --stat
          git commit -m "Automate Windows release publishing"
          git push --force origin "HEAD:$env:CLEAN_BRANCH"
          git rev-parse HEAD
