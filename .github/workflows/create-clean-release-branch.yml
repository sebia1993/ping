name: Create Clean Release Branch

on:
  workflow_dispatch:
  push:
    branches:
      - stability/windows-release-verify-20260628
    paths:
      - ".github/workflows/create-clean-release-branch.yml"
      - ".github/validation/**"

permissions:
  contents: write

concurrency:
  group: create-clean-release-branch
  cancel-in-progress: true

jobs:
  create-clean-branch:
    name: Create clean branch from main plus validated patches
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out validation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patches and push clean branch
        shell: bash
        env:
          CLEAN_BRANCH: stability/windows-release-automation-clean-20260629
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config core.autocrlf false

          patch_dir="$RUNNER_TEMP/validation-patches"
          mkdir -p "$patch_dir"
          cp .github/validation/* "$patch_dir"/

          git fetch origin main
          git switch --detach origin/main

          cat "$patch_dir"/local-release-changes.patch.b64.part* > local-release-changes.patch.b64
          raw_sha="$(sha256sum local-release-changes.patch.b64 | awk '{print $1}')"
          if [ "$raw_sha" = "f0e084c94dd78a4f850143d5b3e0850a349aaf2729dd61cc6d52021a2a7c8ca6" ]; then
            python3 -c 'from pathlib import Path; p=Path("local-release-changes.patch.b64"); s=p.read_text().strip(); p.write_text(s[:28821] + "j" + s[28821:])'
          fi
          sha="$(sha256sum local-release-changes.patch.b64 | awk '{print $1}')"
          expected="a215255bbc5510e2375f897bde329cc18ab605969df18f2ced4b0eef056f57dc"
          if [ "$sha" != "$expected" ]; then
            echo "Patch payload SHA mismatch: $sha"
            exit 1
          fi
          base64 -d local-release-changes.patch.b64 | gzip -d > local-release-changes.patch

          patches=(
            "local-release-changes.patch"
            "$patch_dir/windows-mtime-fix.patch"
            "$patch_dir/release-automation-nonworkflow.patch"
            "$patch_dir/release-automation-followup.patch"
            "$patch_dir/release-automation-contract-tests.patch"
          )
          for patch in "${patches[@]}"; do
            git apply --check "$patch"
            git apply "$patch"
          done

          rm -f local-release-changes.patch local-release-changes.patch.b64
          git diff --check
          git add -A
          git diff --cached --stat
          git commit -m "Automate Windows release publishing"
          git push --force origin "HEAD:refs/heads/$CLEAN_BRANCH"
          git rev-parse HEAD
