name: Windows Release Verify

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-release-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build and verify Windows EXE
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run source release verifier
        shell: pwsh
        run: python scripts\verify_release.py

      - name: Build Windows EXE
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_exe.ps1

      - name: Verify packaged EXE
        shell: pwsh
        run: python scripts\verify_release.py --exe

      - name: Upload packaged app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MultiPingCheck-windows-${{ github.run_id }}
          path: dist/MultiPingCheck
          if-no-files-found: error

      - name: Upload build outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-debug-${{ github.run_id }}
          path: |
            build/**
            dist/**
          if-no-files-found: ignore
