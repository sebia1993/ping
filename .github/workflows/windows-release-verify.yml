name: Windows Release Verify

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "stability/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-release-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build and verify Windows EXE
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Configure Git line endings
        shell: pwsh
        run: git config --global core.autocrlf false

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apply local validation patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $parts = Get-ChildItem -Path .github\validation -Filter 'local-release-changes.patch.b64.part*' | Sort-Object Name
          if ($parts.Count -ne 6) {
            throw "Expected 6 patch chunks, found $($parts.Count)."
          }
          $base64 = ($parts | ForEach-Object { (Get-Content -LiteralPath $_.FullName -Raw).Trim() }) -join ''
          $rawSha = [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::ASCII.GetBytes($base64))).Replace('-', '').ToLowerInvariant()
          if ($rawSha -eq 'f0e084c94dd78a4f850143d5b3e0850a349aaf2729dd61cc6d52021a2a7c8ca6') {
            $base64 = $base64.Insert(28821, 'j')
          }
          $sha = [System.BitConverter]::ToString([System.Security.Cryptography.SHA256]::HashData([System.Text.Encoding]::ASCII.GetBytes($base64))).Replace('-', '').ToLowerInvariant()
          if ($sha -ne 'a215255bbc5510e2375f897bde329cc18ab605969df18f2ced4b0eef056f57dc') {
            throw "Patch payload SHA mismatch: $sha"
          }
          [System.IO.File]::WriteAllBytes('local-release-changes.patch.gz', [System.Convert]::FromBase64String($base64))
          @'
          from pathlib import Path
          import gzip
          Path("local-release-changes.patch").write_bytes(gzip.decompress(Path("local-release-changes.patch.gz").read_bytes()))
          '@ | python -
          git apply --check local-release-changes.patch
          git apply local-release-changes.patch
          git status --short

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run source release verifier
        shell: pwsh
        run: python scripts\verify_release.py

      - name: Build Windows EXE
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build_windows_exe.ps1

      - name: Verify packaged EXE
        shell: pwsh
        run: python scripts\verify_release.py --exe

      - name: Upload packaged app
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MultiPingCheck-windows-${{ github.run_id }}
          path: dist/MultiPingCheck
          if-no-files-found: error

      - name: Upload build outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-debug-${{ github.run_id }}
          path: |
            build/**
            dist/**
            local-release-changes.patch
          if-no-files-found: ignore
